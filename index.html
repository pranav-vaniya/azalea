<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>azalea</title>
		<meta name="theme-color" content="#af4c0f" />

		<link rel="stylesheet" href="libraries/bootstrap/css/bootstrap.min.css" />
		<link rel="stylesheet" href="styles.css" />
	</head>

	<body>
		<nav class="navbar bg-body-tertiary mb-3">
			<div class="container-fluid">
				<a class="navbar-brand" href="#">
					<img src="icons/icon-512.png" alt="Logo" width="32" height="32" class="d-inline-block align-text-top" />
					azalea
				</a>
				<button class="btn settings-button" data-bs-toggle="modal" data-bs-target="#settings-modal">

		</nav>

		<div class="container-fluid">
			<div class="error-message-container" id="error-message-container">
				<span id="error-message" class="error-message"></span>
				<button type="button" class="btn btn-danger error-message-hide-button" onclick="HideErrorMessage();">
					<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-circle-fill" viewBox="0 0 16 16">
						<path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293z" />
					</svg>
				</button>
			</div>

			<div class="form-floating mb-2">
				<input type="number" class="form-control form-control-lg border-0" id="gold-price-user-input" placeholder="0" value="0" />
				<label for="gold-price-user-input">24K Gold (100 g)</label>
			</div>

			<hr />

			<table class="table table-borderless table-hover text-center mb-3">
				<thead>
					<tr>
						<th scope="col" style="width: 30%">Fine Wt.</th>
						<th scope="col" style="width: 30%">OCH</th>
						<th scope="col">Rate</th>
					</tr>
				</thead>
				<tbody id="weight-och-rate-table-body"></tbody>
			</table>

			<hr />

			<table class="table table-borderless table-hover text-center table-sm">
				<thead>
					<tr>
						<th scope="col" style="width: 30%">Rate</th>
						<th scope="col" style="width: 30%">Diff</th>
						<th scope="col">MCX</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>
							<input class="form-control border-0 text-center p-0" type="number" placeholder="0" value="0" id="user-mcx-rate-input" />
						</td>
						<td>
							<input class="form-control border-0 text-center p-0" type="number" placeholder="0" value="0" id="user-mcx-diff-input" />
						</td>
						<td id="user-mcx-output">0</td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- settings modal -->
		<div class="modal fade" id="settings-modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="settings-modal-title" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-fullscreen">
				<div class="modal-content">
					<div class="modal-header">
						<h1 class="modal-title fs-5" id="settings-modal-title">Settings</h1>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">Will Be Added Soon :)</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancel</button>
						<button type="button" class="btn btn-success">Save</button>
					</div>
				</div>
			</div>
		</div>

		<script src="libraries/bootstrap/js/bootstrap.min.js"></script>
		<script src="libraries/jquery/jquery-3.7.1.min.js"></script>
		<script src="script.js"></script>
	</body>
</html>
